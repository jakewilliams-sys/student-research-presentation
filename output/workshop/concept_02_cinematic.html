<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow Their Order — Cinematic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1917;
      --text-light: #f0ede6;
      --text-muted: rgba(240, 237, 230, 0.7);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --persona-optimizer: #1d7775;
      --persona-social: #b07328;
      --persona-balancer: #3a7a55;
      --persona-dependent: #6454a4;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      overflow: hidden;
    }

    .presentation {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Film grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Color wash transition overlay */
    .color-wash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.6s var(--ease-out-expo);
    }

    .color-wash.active {
      opacity: 1;
      animation: wash-pulse 1.2s var(--ease-out-expo) forwards;
    }

    @keyframes wash-pulse {
      0% { opacity: 0; }
      30% { opacity: 0.4; }
      70% { opacity: 0.25; }
      100% { opacity: 0; }
    }

    .slides {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(2rem, 5vw, 4rem);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s var(--ease-out-expo), visibility 0.5s;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 1;
    }

    .slide.exiting {
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.4s var(--ease-out-expo), transform 0.4s var(--ease-out-expo), visibility 0.4s;
    }

    .slide .slide-content {
      max-width: 56rem;
      width: 100%;
      text-align: center;
    }

    .slide .slide-content > * {
      opacity: 0;
      transform: translateY(24px);
    }

    .slide.active .slide-content > * {
      animation: slide-in 0.7s var(--ease-out-expo) forwards;
    }

    .slide.active .slide-content > *:nth-child(1) { animation-delay: 0ms; }
    .slide.active .slide-content > *:nth-child(2) { animation-delay: 100ms; }
    .slide.active .slide-content > *:nth-child(3) { animation-delay: 200ms; }
    .slide.active .slide-content > *:nth-child(4) { animation-delay: 300ms; }
    .slide.active .slide-content > *:nth-child(5) { animation-delay: 400ms; }
    .slide.active .slide-content > *:nth-child(6) { animation-delay: 500ms; }
    .slide.active .slide-content > *:nth-child(7) { animation-delay: 600ms; }
    .slide.active .slide-content > *:nth-child(8) { animation-delay: 700ms; }
    .slide.active .slide-content > *:nth-child(9) { animation-delay: 800ms; }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Stage label */
    .stage-label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }

    /* Persona name - huge display */
    .persona-name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: clamp(1rem, 2vw, 1.5rem);
    }

    /* Tagline */
    .tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      color: var(--text-muted);
      max-width: 36rem;
      margin: 0 auto;
    }

    /* Quote block */
    .quote-block {
      margin: clamp(3rem, 6vw, 5rem) 0;
      padding: 0 clamp(1rem, 3vw, 2rem);
    }

    .quote-text {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.5rem, 3.5vw, 2.5rem);
      font-style: italic;
      line-height: 1.4;
      color: var(--text-light);
    }

    .quote-cite {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      color: var(--text-muted);
      margin-top: 1rem;
    }

    /* Emotion badge - viewport corner */
    .emotion-badge {
      position: fixed;
      bottom: clamp(1.5rem, 3vw, 2rem);
      right: clamp(1.5rem, 3vw, 2.5rem);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      font-weight: 500;
      color: var(--text-muted);
    }

    .emotion-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    /* Context text */
    .context {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 42rem;
      margin: 0 auto clamp(2rem, 4vw, 3rem);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(1.5rem, 3vw, 2.5rem);
      margin-top: 2rem;
    }

    .stat {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      color: var(--text-muted);
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      bottom: clamp(1rem, 2vw, 1.5rem);
      left: clamp(1.5rem, 3vw, 2.5rem);
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      color: var(--text-muted);
      z-index: 100;
    }

    /* Title slide */
    .slide-title .main-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(3.5rem, 8vw, 6rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: clamp(0.75rem, 1.5vw, 1rem);
    }

    .slide-title .subtitle {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      color: var(--text-muted);
    }

    /* Intro slide - persona cards */
    .intro-personas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
      gap: clamp(1.5rem, 3vw, 2rem);
      margin-top: clamp(2rem, 4vw, 3rem);
      text-align: left;
    }

    .intro-persona-card {
      padding: clamp(1rem, 2vw, 1.5rem);
      border-left: 3px solid;
      background: rgba(255,255,255,0.02);
    }

    .intro-persona-card.optimizer { border-color: var(--persona-optimizer); }
    .intro-persona-card.social { border-color: var(--persona-social); }
    .intro-persona-card.balancer { border-color: var(--persona-balancer); }
    .intro-persona-card.dependent { border-color: var(--persona-dependent); }

    .intro-persona-name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      margin-bottom: 0.25rem;
    }

    .intro-persona-tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(0.75rem, 1.3vw, 0.9rem);
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Persona intro - quote with border */
    .persona-intro-quote {
      border-left: 4px solid;
      padding-left: clamp(1.5rem, 3vw, 2rem);
      margin: clamp(2rem, 4vw, 3rem) auto;
      max-width: 40rem;
      text-align: left;
    }

    .persona-intro-quote.optimizer { border-color: var(--persona-optimizer); }
    .persona-intro-quote.social { border-color: var(--persona-social); }
    .persona-intro-quote.balancer { border-color: var(--persona-balancer); }
    .persona-intro-quote.dependent { border-color: var(--persona-dependent); }

    /* Comparison slide */
    .comparison-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(1rem, 2vw, 1.5rem);
      margin-top: clamp(2rem, 4vw, 3rem);
      text-align: left;
    }

    .comparison-card {
      padding: clamp(1.25rem, 2.5vw, 1.75rem);
      border-left: 4px solid;
      background: rgba(255,255,255,0.03);
    }

    .comparison-card.outlier {
      outline: 1px solid rgba(255,255,255,0.15);
    }

    .comparison-persona {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      margin-bottom: 0.5rem;
    }

    .comparison-emotion {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .comparison-emotion.positive { color: #7cb87c; }
    .comparison-emotion.negative { color: #c87c7c; }

    .comparison-quote {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .comparison-cards > * {
      opacity: 0;
      transform: translateY(16px);
      animation: slide-in 0.6s var(--ease-out-expo) forwards;
    }

    .slide.active .comparison-cards > *:nth-child(1) { animation-delay: 400ms; }
    .slide.active .comparison-cards > *:nth-child(2) { animation-delay: 500ms; }
    .slide.active .comparison-cards > *:nth-child(3) { animation-delay: 600ms; }
    .slide.active .comparison-cards > *:nth-child(4) { animation-delay: 700ms; }

    /* Closing slide */
    .closing-heading {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.75rem, 3.5vw, 2.5rem);
      line-height: 1.3;
      margin-bottom: clamp(1.5rem, 3vw, 2rem);
    }

    .closing-body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 44rem;
      margin: 0 auto;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .slide,
      .slide.exiting,
      .slide .slide-content > *,
      .color-wash {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
      }

      .slide .slide-content > * {
        opacity: 1;
        transform: none;
      }

      .slide.active .slide-content > * {
        opacity: 1;
        transform: none;
      }

      .comparison-cards > * {
        opacity: 1;
        transform: none;
      }

      .color-wash.active {
        animation: none;
        opacity: 0;
      }
    }
  </style>

      "personas": [
        {"id": "optimizer", "name": "The Pragmatic Optimizer", "shortName": "Optimizer", "color": "#1d7775", "colorSoft": "#e8f3f3", "tagline": "Systematic efficiency meets strategic deal-hunting", "stats": ["12 participants", "Orders fortnightly", "None hold Deliveroo Plus alone"], "introQuote": {"text": "Ordering a takeaway after an exam… that's an enjoyable meal. It's like a reward. You've earned it.", "cite": "P007"}, "stages": [{"name": "Deciding to order", "emotion": "Comfort", "score": "4/5", "context": "It's Thursday evening. Lectures are done, the library is closed, and tomorrow's assignment can wait. The thought of cooking crosses their mind — and is immediately weighed against the effort.", "quote": {"text": "It sort of takes you out from when you're doing, like, work all day. It's just something different that you can focus on.", "cite": "P025"}}, {"name": "Choosing where & what", "emotion": "Stress", "score": "2/5", "context": "Three apps open. Delivery fees compared. Menu prices cross-referenced. The minimum order threshold means adding a drink they don't really want to hit £15.", "quote": {"text": "I try to make it about £15 to save delivery fees… it makes some changes in my delivery order.", "cite": "P012"}}, {"name": "Placing the order", "emotion": "Excitement", "score": "5/5", "context": "The calculation is complete. The order is placed. For a brief moment, the optimisation stops and something simpler takes over: anticipation. The fee was managed. The reward is incoming.", "quote": null}, {"name": "Waiting for delivery", "emotion": "Neutral", "score": "3/5", "context": "Twenty-five minutes. Time to do something else. The waiting barely registers — the emotional work was in the decision, not the delivery.", "quote": null, "limitedData": true}, {"name": "Eating the food", "emotion": "Comfort", "score": "4/5", "context": "The food arrives exactly as expected. No surprises, no disappointment. The meal is eaten with quiet satisfaction — a small, earned ", "context": "The food is eaten. The social energy fades. And then, quietly: was that too much? The guilt doesn't come from the food — it comes from eating it alone with your thoughts.", "quote": {"text": "When you're going out with friends, it doesn't feel as bad getting a pizza. It feels more like a social thing rather than ordering it to your house and eating it on your own.", "cite": "P001"}}, {"name": "After the meal", "emotion": "Comfort", "score": "4/5", "context": "It's done. Plates stacked, containers binned. The evening settles into the kind of comfort that only comes from a shared routine. Next Friday, the same thing will happen.", "quote": null}]},

otionally flat — and that flatness is the insight.", "quote": null}, {"name": "After the meal", "emotion": "Comfort", "score": "4/5", "context": "It's over. The money is spent. And in the quiet aftermath, there's a gentle comfort: it was a while since the last one. It was justified.", "quote": {"text": "I've had quite a busy or stressful week as, like, a little reward.", "cite": "P028"}}]},

    function buildSlides() {
      const container = document.getElementById('slides');
      let idx = 0;

      function addSlide(html, type = '') {
        const slide = document.createElement('div');
        slide.className = `slide ${type}`.trim();
        slide.dataset.index = idx;
        slide.innerHTML = html;
        container.appendChild(slide);
        idx++;
      }

      // 1. Title
      addSlide(`
        <div class="slide-content">
          <h1 class="main-title">${DATA.title}</h1>
          <p class="subtitle">${DATA.subtitle}</p>
        </div>
      `, 'slide-title');

      // 2. Intro
      const introCards = DATA.personas.map(p => `
        <div class="intro-persona-card ${p.id}">
          <div class="intro-persona-name" style="color: ${p.color}">${p.shortName}</div>
          <div class="intro-persona-tagline">${p.tagline}</div>
        </div>
      `).join('');
      addSlide(`
        <div class="slide-content">
          <p class="stage-label">Overview</p>
          <h2 class="persona-name">${DATA.intro}</h2>
          <div class="intro-personas">${introCards}</div>
        </div>
      `);

      // Personas: intro + 6 stages each
      DATA.personas.forEach((persona, pIdx) => {
        // Persona intro
        const quoteHtml = persona.introQuote ? `
          <div class="persona-intro-quote ${persona.id}">
            <p class="quote-text">"${persona.introQuote.text}"</p>
            <p class="quote-cite">— ${persona.introQuote.cite}</p>
          </div>
        ` : '';
        const statsHtml = persona.stats.map(s => `<span class="stat">${s}</span>`).join('');
        addSlide(`
          <div class="slide-content">
            <p class="stage-label">Persona ${pIdx + 1}</p>
            <h2 class="persona-name" style="color: ${persona.color}">${persona.name}</h2>
            <p class="tagline">${persona.tagline}</p>
            ${quoteHtml}
            <div class="stats-row">${statsHtml}</div>
          </div>
        `, `persona-intro persona-${persona.id}`);

        // 6 stages
        persona.stages.forEach((stage, sIdx) => {
          const quoteHtml = stage.quote ? `
            <div class="quote-block">
              <p class="quote-text">"${stage.quote.text}"</p>
              <p class="quote-cite">— ${stage.quote.cite}</p>
            </div>
          ` : '';
          const limitedBadge = stage.limitedData ? '<span class="stat">Limited data</span>' : '';
          addSlide(`
            <div class="slide-content" style="position: relative">
              <p class="stage-label">${stage.name.toUpperCase()}</p>
              <p class="context">${stage.context}</p>
              ${quoteHtml}
              <div class="emotion-badge">
                <span class="emotion-dot" style="background: ${persona.color}"></span>
                <span>${stage.emotion} · ${stage.score}</span>
                ${limitedBadge}
              </div>
            </div>
          `, `stage persona-${persona.id}`);
        });
      });

      // Comparison
      const compCards = DATA.comparison.cards.map(c => `
        <div class="comparison-card ${c.outlier ? 'outlier' : ''}" style="border-color: ${c.color}">
          <div class="comparison-persona" style="color: ${c.color}">${c.persona}</div>
          <div class="comparison-emotion ${c.positive ? 'positive' : 'negative'}">${c.emotion} · ${c.score}</div>
          <p class="comparison-quote">"${c.quote}"</p>
          <p class="quote-cite">— ${c.cite}</p>
        </div>
      `).join('');
      addSlide(`
        <div class="slide-content">
          <p class="stage-label">${DATA.comparison.stage.toUpperCase()}</p>
          <h2 class="persona-name">${DATA.comparison.heading}</h2>
          <div class="comparison-cards">${compCards}</div>
        </div>
      `, 'comparison');

      // Closing
      addSlide(`
        <div class="slide-content">
          <h2 class="closing-heading">${DATA.closing.heading}</h2>
          <p class="closing-body">${DATA.closing.body}</p>
        </div>
      `, 'closing');

      return idx;
    }

    const totalSlides = buildSlides();
    const slides = document.querySelectorAll('.slide');
    const colorWash = document.getElementById('colorWash');
    const counter = document.getElementById('slideCounter');

    let currentIndex = 0;
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function getNextPersonaColor() {
      for (let i = currentIndex + 1; i < slides.length; i++) {
        const slide = slides[i];
        if (slide.classList.contains('persona-intro')) {
          const match = slide.className.match(/persona-(optimizer|social|balancer|dependent)/);
          if (match) return PERSONA_COLORS[match[1]];
        }
      }
      return null;
    }

    function isPersonaTransition(fromIdx, toIdx) {
      const fromSlide = slides[fromIdx];
      const toSlide = slides[toIdx];
      if (!fromSlide || !toSlide) return false;
      const fromPersona = fromSlide.className.match(/persona-(optimizer|social|balancer|dependent)/);
      const toPersona = toSlide.className.match(/persona-(optimizer|social|balancer|dependent)/);
      if (!fromPersona || !toPersona) return false;
      return fromPersona[1] !== toPersona[1];
    }

    function isLastStageOfPersona(idx) {
      const slide = slides[idx];
      if (!slide || !slide.classList.contains('stage')) return false;
      const nextSlide = slides[idx + 1];
      if (!nextSlide) return false;
      return nextSlide.classList.contains('persona-intro') || nextSlide.classList.contains('comparison');
    }

    function goToSlide(idx) {
      if (idx < 0 || idx >= totalSlides) return;
      const prevIdx = currentIndex;
      const prevSlide = slides[prevIdx];
      const nextSlide = slides[idx];

      // Trigger color wash when moving from last stage of persona to next persona intro
      if (reducedMotion) {
        prevSlide?.classList.remove('active');
        nextSlide?.classList.add('active');
        currentIndex = idx;
        counter.textContent = `${idx + 1} / ${totalSlides}`;
        return;
      }

      const triggerColorWash = isLastStageOfPersona(prevIdx) && nextSlide?.classList.contains('persona-intro');
      const personaMatch = nextSlide?.className.match(/persona-(optimizer|social|balancer|dependent)/);
      const nextColor = triggerColorWash && personaMatch ? PERSONA_COLORS[personaMatch[1]] : null;

      if (triggerColorWash && nextColor) {
        colorWash.style.backgroundColor = nextColor;
        colorWash.classList.add('active');
      }

      prevSlide?.classList.add('exiting');
      setTimeout(() => {
        prevSlide?.classList.remove('active', 'exiting');
        nextSlide?.classList.add('active');
        currentIndex = idx;
        counter.textContent = `${idx + 1} / ${totalSlides}`;
        if (triggerColorWash) {
          setTimeout(() => colorWash.classList.remove('active'), 1200);
        }
      }, 400);
    }

    function next() {
      goToSlide(currentIndex + 1);
    }

    function prev() {
      goToSlide(currentIndex - 1);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        next();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prev();
      }
    });

    document.addEventListener('click', (e) => {
      const w = window.innerWidth;
      if (e.clientX > w * 0.7) next();
      else if (e.clientX < w * 0.3) prev();
    });

    slides[0].classList.add('active');
    counter.textContent = `1 / ${totalSlides}`;
  </script>
</body>
</html>
