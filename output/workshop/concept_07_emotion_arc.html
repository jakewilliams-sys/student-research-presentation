<!DOCTYPE html>
<html lang="en">
<head>

  <title>Follow Their Order — Emotion Arc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f6f1;
      --text: #2c2a25;
      --text-muted: #5a5750;
      --optimizer: #1d7775;
      --optimizer-soft: #e8f3f3;
      --social: #b07328;
      --social-soft: #f7f0e4;
      --balancer: #3a7a55;
      --balancer-soft: #e9f3ed;
      --dependent: #6454a4;
      --dependent-soft: #efedf7;
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --section-padding: clamp(3rem, 8vw, 6rem);
      --graph-height: clamp(280px, 35vh, 380px);
      --graph-width: min(100%, 720px);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    h1, h2, h3, .serif { font-family: 'Instrument Serif', Georgia, serif; }
    h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 400; margin: 0; line-height: 1.15; }
    h2 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 400; margin: 0 0 1rem; }
    p { margin: 0 0 1rem; font-size: clamp(1rem, 1.2vw, 1.125rem); color: var(--text-muted); }
    .quote { font-family: 'Instrument Serif', Georgia, serif; font-size: clamp(1.25rem, 2vw, 1.5rem); font-style: italic; color: var(--text); }
    .cite { font-size: 0.875rem; color: var(--text-muted); font-style: normal; }

    .section {
      padding: var(--section-padding) 1.5rem;
      max-width: 56rem;
      margin: 0 auto;
    }

    /* Title section */
    .title-section {
      text-align: center;
      padding: clamp(4rem, 10vw, 6rem) 1.5rem clamp(2rem, 5vw, 3rem);
    }
    .title-section .subtitle {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      color: var(--text-muted);
      margin-top: 1rem;
    }

    /* Intro persona cards */
    .intro-section {
      padding-bottom: clamp(2rem, 5vw, 3rem);
    }
    .intro-section .intro-text {
      text-align: center;
      font-size: clamp(1.125rem, 1.5vw, 1.25rem);
      max-width: 36rem;
      margin: 0 auto 2rem;
      color: var(--text-muted);
    }
    .persona-cards {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 0.5rem 0 1.5rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .persona-cards::-webkit-scrollbar { height: 6px; }
    .persona-cards::-webkit-scrollbar-track { background: rgba(44,42,37,0.06); border-radius: 3px; }
    .persona-cards::-webkit-scrollbar-thumb { background: rgba(44,42,37,0.2); border-radius: 3px; }
    .persona-card {
      flex: 0 0 min(280px, 85vw);
      scroll-snap-align: start;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(44,42,37,0.08);
      background: white;
      transition: box-shadow 0.3s var(--ease-out-quart), transform 0.3s var(--ease-out-quart);
    }
    .persona-card:hover {
      box-shadow: 0 8px 24px rgba(44,42,37,0.08);
    }
    .persona-card .card-name {
      font-family: 'Instrument Serif', serif;

      margin: 0 0 0.25rem;
      font-weight: 400;
    }
    .persona-card .card-tagline {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0 0.75rem;
      line-height: 1.4;
    }
    .persona-card .card-stats {

      color: var(--text-muted);
      margin: 0;
    }
    .persona-card.optimizer { border-left: 4px solid var(--optimizer); }
    .persona-card.social { border-left: 4px solid var(--social); }
    .persona-card.balancer { border-left: 4px solid var(--balancer); }
    .persona-card.dependent { border-left: 4px solid var(--dependent); }

    /* Persona tabs */
    .persona-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      background: var(--bg);
      border-bottom: 1px solid rgba(44, 42, 37, 0.1);
      position: sticky;
      top: 0;
      z-index: 20;
      justify-content: center;
      flex-wrap: wrap;
    }
    .persona-tab {
      padding: 0.625rem 1.25rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9375rem;
      font-weight: 500;
      border: none;
      border-radius: 2rem;
      background: rgba(44, 42, 37, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: background 0.3s var(--ease-out-quart), color 0.3s var(--ease-out-quart);
    }
    .persona-tab:hover {
      background: rgba(44, 42, 37, 0.1);
    }
    .persona-tab.active {
      color: white;
    }
    .persona-tab.optimizer.active { background: var(--optimizer); }
    .persona-tab.social.active { background: var(--social); }
    .persona-tab.balancer.active { background: var(--balancer); }
    .persona-tab.dependent.active { background: var(--dependent); }
    .persona-tab:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    /* Graph section */
    .graph-section {
      padding: clamp(2rem, 5vw, 4rem) 1.5rem;
      max-width: none;
    }
    .graph-wrapper {
      max-width: 800px;
      margin: 0 auto;
    }
    .graph-container {
      position: relative;
      width: 100%;
      padding: clamp(1.5rem, 4vw, 2.5rem) clamp(2rem, 5vw, 3rem);
      background: white;
      border-radius: 16px;
      border: 1px solid rgba(44,42,37,0.08);
      box-shadow: 0 4px 24px rgba(44,42,37,0.04);
      transition: opacity 0.4s var(--ease-out-quart);
    }
    .graph-container.persona-switching {
      opacity: 0;
    }
    .graph-svg-wrapper {
      width: 100%;
      height: var(--graph-height);
      position: relative;
    }
    .graph-svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .graph-area {
      fill: url(#graphGradient);
      opacity: 0.35;
      transition: opacity 0.4s var(--ease-out-quart);
    }
    .graph-line {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.4s var(--ease-out-quart), opacity 0.4s var(--ease-out-quart);
    }
    .graph-point {
      cursor: pointer;
      transition: r 0.25s var(--ease-out-quart), filter 0.25s var(--ease-out-quart);
    }
    .graph-point:hover {
      filter: drop-shadow(0 0 6px currentColor);
    }
    .graph-point.active {
      filter: drop-shadow(0 0 10px currentColor);
    }
    .graph-point circle {
      transition: fill 0.25s var(--ease-out-quart), stroke-width 0.25s var(--ease-out-quart);
    }
    .graph-point.visited circle {
      fill: var(--point-fill, currentColor);
    }
    .graph-point.active circle {
      stroke-width: 3;
    }
    .graph-label-y {
      font-size: clamp(0.6875rem, 1.2vw, 0.8125rem);
      fill: var(--text-muted);
      font-family: 'Plus Jakarta Sans', sans-serif;
      pointer-events: none;
    }
    .graph-label-x {
      font-size: clamp(0.6875rem, 1.2vw, 0.8125rem);
      fill: var(--text-muted);
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-anchor: middle;
      pointer-events: none;
    }
    .graph-emotion-label {
      font-size: clamp(0.5625rem, 1vw, 0.6875rem);
      fill: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 500;
      text-anchor: middle;
      pointer-events: none;
    }
    .graph-point:focus {
      outline: none;
    }
    .graph-point:focus-visible circle {
      stroke: var(--text);
      stroke-width: 3;
    }

    /* Content panel */
    .content-panel {
      margin-top: clamp(1.5rem, 4vw, 2.5rem);
      padding-top: clamp(1.5rem, 4vw, 2rem);
      border-top: 1px solid rgba(44,42,37,0.08);

      transition: opacity 0.35s var(--ease-out-quart);

    .content-panel.fade-out {
      opacity: 0;

    .content-panel .stage-name {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.25rem, 2vw, 1.5rem);
      margin: 0 0 0.25rem;
      font-weight: 400;
    }
    .content-panel .emotion-badge {
      display: inline-block;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      margin-bottom: 0.75rem;
    }
    .content-panel .context {
      font-size: clamp(1rem, 1.2vw, 1.125rem);
      color: var(--text-muted);
      line-height: 1.6;
      margin: 0 0 1rem;
    }
    .content-panel .quote-block {
      margin: 1rem 0 0;
      padding: 1rem 1.25rem;
      border-left: 4px solid;
      background: rgba(44,42,37,0.03);
      border-radius: 0 8px 8px 0;
    }
    .content-panel .quote-block .quote {
      margin: 0 0 0.5rem;
      font-size: clamp(1.125rem, 1.5vw, 1.25rem);
    }
    .content-panel .quote-block .cite {
      margin: 0;
    }
    .content-panel .empty-state {
      color: var(--text-muted);
      font-size: clamp(1rem, 1.2vw, 1.125rem);
      padding: 2rem 0;
      text-align: center;
    }

    /* Comparison section */
    .comparison-section {
      padding: var(--section-padding) 1.5rem;
      background: white;
      border-top: 1px solid rgba(44,42,37,0.08);
    }
    .comparison-section h2 {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .comparison-section .comparison-stage {
      text-align: center;
      font-size: 0.9375rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .comparison-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
      max-width: 56rem;
      margin: 0 auto;
    }
    .comparison-card {
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(44,42,37,0.08);
      border-left: 4px solid;
      background: var(--bg);
    }
    .comparison-card .card-persona {
      font-family: 'Instrument Serif', serif;
      font-size: 1.125rem;
      margin: 0 0 0.25rem;
    }
    .comparison-card .card-emotion {
      font-size: 0.8125rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    .comparison-card .card-quote {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1rem;
      margin: 0 0 0.5rem;
      color: var(--text);
    }
    .comparison-card .card-cite {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .comparison-card.outlier {
      border-left-color: var(--text-muted) !important;
    }

    /* Closing section */
    .closing-section {
      text-align: center;
      padding: var(--section-padding) 1.5rem;
    }
    .closing-section h2 {
      max-width: 32rem;
      margin-left: auto;
      margin-right: auto;
    }
    .closing-section p {
      max-width: 36rem;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <section class="title-section">
    <h1>Follow Their Order</h1>
    <p class="subtitle">Four students. Six stages. One ordering journey.</p>
  </section>

  <section class="intro-section section">
    <p class="intro-text">Same app. Four completely different experiences.</p>
    <div class="persona-cards" id="personaCards"></div>
  </section>

  <nav class="persona-tabs" id="personaTabs"></nav>

  <section class="graph-section">
    <div class="graph-wrapper">
      <div class="graph-container">
        <svg class="graph-svg" id="emotionGraph" viewBox="0 0 640 320" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="graphGradient" x1="0" y1="1" x2="0" y2="0">
              <stop id="gradStop0" offset="0%" stop-opacity="0.4"/>
              <stop id="gradStop1" offset="100%" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <g id="graphContent"></g>
        </svg>
        <div class="content-panel" id="contentPanel">
          <p class="empty-state">Click a point on the graph to explore each stage of the journey.</p>
        </div>
      </div>
    </div>
  </section>

  <section class="comparison-section section">
    <h2 id="comparisonHeading"></h2>
    <p class="comparison-stage" id="comparisonStage"></p>
    <div class="comparison-cards" id="comparisonCards"></div>
  </section>

  <section class="closing-section section">
    <h2 id="closingHeading"></h2>
    <p id="closingBody"></p>
  </section>

  <script>
    (function() {
      const PERSONA_DATA = {"title":"Follow Their Order","subtitle":"Four students. Six stages. One ordering journey.","intro":"Same app. Four completely different experiences.","stages":["Trigger","Decision","Order","Wait","Meal","After"],"stageNames":["Deciding to order","Choosing where & what","Placing the order","Waiting for delivery","Eating the food","After the meal"],"closing":{"heading":"What happens between wanting to order and actually ordering?","body":"Four students. Four journeys. But every one of them considered Deliveroo. The question isn't whether students want to order. It's what happens in the gap."},"personas":[{"id":"optimizer","name":"The Pragmatic Optimizer","shortName":"Optimizer","color":"#1d7775","colorSoft":"#e8f3f3","tagline":"Systematic efficiency meets strategic deal-hunting","stats":["12 participants","Orders fortnightly","None hold Deliveroo Plus alone"],"introQuote":{"text":"Ordering a takeaway after an exam… that's an enjoyable meal. It's like a reward. You've earned it.","cite":"P007"},"stages":[{"name":"Deciding to order","emotion":"Comfort","score":"4/5","context":"It's Thursday evening. Lectures are done, the library is closed, and tomorrow's assignment can wait. The thought of cooking crosses their mind — and is immediately weighed against the effort.","quote":{"text":"It sort of takes you out from when you're doing, like, work all day. It's just something different that you can focus on.","cite":"P025"}},{"name":"Choosing where & what","emotion":"Stress","score":"2/5","context":"Three apps open. Delivery fees compared. Menu prices cross-referenced. The minimum order threshold means adding a drink they don't really want to hit £15.","quote":{"text":"I try to make it about £15 to save delivery fees… it makes some changes in my delivery order.","cite":"P012"}},{"name":"Placing the order","emotion":"Excitement","score":"5/5","context":"The calculation is complete. The order is placed. For a brief moment, the optimisation stops and something simpler takes over: anticipation. The fee was managed. The reward is incoming.","quote":null},{"name":"Waiting for delivery","emotion":"Neutral","score":"3/5","context":"Twenty-five minutes. Time to do something else. The waiting barely registers — the emotional work was in the decision, not the delivery.","quote":null,"limitedData":true},{"name":"Eating the food","emotion":"Comfort","score":"4/5","context":"The food arrives exactly as expected. No surprises, no disappointment. The meal is eaten with quiet satisfaction — a small, earned reward after a calculated decision.","quote":null},{"name":"After the meal","emotion":"Excitement","score":"5/5","context":"Worth it. The math checked out. The fee was saved. The reward was earned. A productive day capped with a strategic indulgence.","quote":{"text":"Whether that's through a productive day or I've gone on a long hike or something. Where you've earned it.","cite":"P007"}}]},{"id":"social","name":"The Social Orderer","shortName":"Social","color":"#b07328","colorSoft":"#f7f0e4","tagline":"Group dynamics drive delivery decisions","stats":["9 participants","Orders fortnightly to monthly","Friday evenings & weekends"],"introQuote":{"text":"Oh, it's like an unspoken ritual… We're not meant to call it a 'ritual,' but it definitely is.","cite":"P001"},"stages":[{"name":"Deciding to order","emotion":"Stress","score":"2/5","context":"A friend mentions food. Another one pulls out their phone. The seed is planted. Now it's not about whether to order — it's about being part of the moment.","quote":{"text":"I sat next to my mate, and he was like, 'Oh, I just think I'm going to order something.' And that's all, like, planted a seed in my head.","cite":"P015"}},{"name":"Choosing where & what","emotion":"Stress","score":"2/5","context":"Everyone has opinions. Different restaurants, different cuisines, different apps. Someone needs to take charge — but deciding for the group means absorbing the blame if it's wrong.","quote":{"text":"Something about takeaways at home even with friends don't feel as social. Whereas if you're out and about together it feels more social for some reason.","cite":"P022"}},{"name":"Placing the order","emotion":"Connection","score":"5/5","context":"One phone, one account, one subscription splitting the cost. The order goes in and for a moment, the group is aligned: this is their Friday night.","quote":{"text":"I ordered from my account. I have a membership, so I ordered from my account all together and then we split it in like three or four.","cite":"P009"}},{"name":"Waiting for delivery","emotion":"Neutral","score":"3/5","context":"The group shifts to something else — a show, a conversation, a game. The food is coming. That's all that matters right now.","quote":null,"limitedData":true},{"name":"Eating the food","emotion":"Guilt","score":"2/5","context":"The food is eaten. The social energy fades. And then, quietly: was that too much? The guilt doesn't come from the food — it comes from eating it alone with your thoughts.","quote":{"text":"When you're going out with friends, it doesn't feel as bad getting a pizza. It feels more like a social thing rather than ordering it to your house and eating it on your own.","cite":"P001"}},{"name":"After the meal","emotion":"Comfort","score":"4/5","context":"It's done. Plates stacked, containers binned. The evening settles into the kind of comfort that only comes from a shared routine. Next Friday, the same thing will happen.","quote":null}]},{"id":"balancer","name":"The Budget Balancer","shortName":"Balancer","color":"#3a7a55","colorSoft":"#e9f3ed","tagline":"Careful financial management meets occasional treats","stats":["6 participants","Orders monthly or less","Delivery reserved for special occasions"],"introQuote":{"text":"I'm not really the kind of person that likes having subscriptions anyway because I just don't… like money coming out.","cite":"P023"},"stages":[{"name":"Deciding to order","emotion":"Stress","score":"2/5","context":"The internal negotiation begins. Has it been long enough since the last order? Is there food in the fridge? Is this a genuine craving or just convenience? Three conditions must be met before permission is granted.","quote":{"text":"Justified is probably just when it's been a while, if it's something I've been feeling like having, and if it's time to do another grocery shop.","cite":"P005"}},{"name":"Choosing where & what","emotion":"Comfort","score":"4/5","context":"When the answer is yes, there's relief. The guilt of deciding to order is replaced by the comfort of choosing well — finding the right deal, the right restaurant, the right amount. The hard part is over.","quote":null},{"name":"Placing the order","emotion":"Frustration","score":"2/5","context":"Then the price hits. Delivery fee. Service fee. The total climbs past the comfortable threshold. Subscriptions that promise savings feel like another cost to justify.","quote":null},{"name":"Waiting for delivery","emotion":"Neutral","score":"3/5","context":"The emotional weight was in the decision. Now there's just time. The waiting is empty — not anxious, not excited, just neutral.","quote":null,"limitedData":true},{"name":"Eating the food","emotion":"Indifference","score":"3/5","context":"The food is fine. It's eaten without ceremony. For the Budget Balancer, the drama was in the permission to order, not in the eating. This stage is emotionally flat — and that flatness is the insight.","quote":null},{"name":"After the meal","emotion":"Comfort","score":"4/5","context":"It's over. The money is spent. And in the quiet aftermath, there's a gentle comfort: it was a while since the last one. It was justified.","quote":{"text":"I've had quite a busy or stressful week as, like, a little reward.","cite":"P028"}}]},{"id":"dependent","name":"The Convenience Dependent","shortName":"Dependent","color":"#6454a4","colorSoft":"#efedf7","tagline":"Delivery as essential life infrastructure","stats":["8 participants","Orders multiple times per week","Up to £100/week on food delivery"],"introQuote":{"text":"Usually, when I'm not at home, I'm always ordering off Just Eat, Deliveroo, or UberEats, ordering to the friend's house. About pretty much five times a week.","cite":"P006"},"stages":[{"name":"Deciding to order","emotion":"Frustration","score":"2/5","context":"The cereal is gone. The milk is out. The shop is a twenty-minute walk in February rain. The frustration isn't about food — it's about everything else getting in the way of eating.","quote":{"text":"I started noticing that we're running out of cereal, eggs, milk, porridge… I didn't feel like going down to the shop… and I didn't have the time.","cite":"P006"}},{"name":"Choosing where & what","emotion":"Comfort","score":"4/5","context":"The decision is barely a decision. The app is already open. The regular order is right there. The only real choice is which platform has the better deal tonight.","quote":{"text":"I have one main flatmate that I usually coordinate with, like when our lectures are, when we'll go to the gym, and so that we try to eat around the same time.","cite":"P036"}},{"name":"Placing the order","emotion":"Connection","score":"5/5","context":"The order is placed — from a friend's house, between lectures, coordinated with a flatmate. Delivery isn't an event. It's infrastructure. The positive feeling comes from the routine itself working smoothly.","quote":null},{"name":"Waiting for delivery","emotion":"Frustration","score":"2/5","context":"The driver can't find the college entrance. The pin drop is wrong. The food sits at a gate while a phone call sorts out what a map couldn't.","quote":{"text":"It's kind of difficult getting the deliveries actually where you want them. Maybe it's just the setup here at Oxford and the different colleges.","cite":"P034"}},{"name":"Eating the food","emotion":"Comfort","score":"4/5","context":"Hot food, couch, winter evening. For a moment, everything makes sense. The convenience was worth it.","quote":{"text":"Definitely winter. I think that's probably what started it… just not wanting to leave the house as much.","cite":"P029"}},{"name":"After the meal","emotion":"Stress","score":"2/5","context":"Then the bank notification arrives. Ninety pounds this week. Maybe more. The spending is visible, the pattern undeniable. Tomorrow it'll happen again.","quote":{"text":"I'd say about… I don't want to lie… about 90 to 100 quid just alone on food, maybe even more.","cite":"P006"}}]}] ,"comparison":{"stage":"Placing the order","heading":"Same moment. Four reactions.","cards":[{"persona":"The Pragmatic Optimizer","emotion":"Excitement","positive":true,"score":"5 / 5","quote":"It's like a reward. You've earned it.","cite":"P007","color":"#1d7775"},{"persona":"The Social Orderer","emotion":"Connection","positive":true,"score":"5 / 5","quote":"I ordered from my account all together and then we split it.","cite":"P009","color":"#b07328"},{"persona":"The Budget Balancer","emotion":"Frustration","positive":false,"score":"2 / 5","quote":"I just don't like money coming out.","cite":"P023","color":"#3a7a55","outlier":true},{"persona":"The Convenience Dependent","emotion":"Connection","positive":true,"score":"5 / 5","quote":"About pretty much five times a week.","cite":"P006","color":"#6454a4"}]}};

      const data = PERSONA_DATA;
      const stages = data.stages;
      const stageNames = data.stageNames;

      function parseScore(scoreStr) {
        const m = String(scoreStr).match(/(\d+)/);
        return m ? parseInt(m[1], 10) : 3;
      }

      function buildSmoothPath(points) {
        if (points.length < 2) return '';
        const pts = points.map(p => ({ x: p.x, y: p.y }));
        let d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = i > 0 ? pts[i - 1] : pts[0];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = i + 2 < pts.length ? pts[i + 2] : pts[pts.length - 1];
          const cp1x = p1.x + (p2.x - p0.x) / 6;
          const cp1y = p1.y + (p2.y - p0.y) / 6;
          const cp2x = p2.x - (p3.x - p1.x) / 6;
          const cp2y = p2.y - (p3.y - p1.y) / 6;
          d += ` C ${cp1x} ${cp1y} ${cp2x} ${cp2y} ${p2.x} ${p2.y}`;
        }
        return d;
      }

      const PADDING = { top: 28, right: 24, bottom: 48, left: 52 };
      const VB_WIDTH = 640;
      const VB_HEIGHT = 320;
      const PLOT_WIDTH = VB_WIDTH - PADDING.left - PADDING.right;
      const PLOT_HEIGHT = VB_HEIGHT - PADDING.top - PADDING.bottom;

      function getPlotCoords(scores) {
        const step = PLOT_WIDTH / 5;
        return scores.map((s, i) => ({
          x: PADDING.left + i * step,
          y: PADDING.top + (1 - (s - 1) / 4) * PLOT_HEIGHT
        }));
      }

      let currentPersonaId = 'optimizer';
      let activeStageIndex = -1;
      let visitedStages = new Set();

      function renderPersonaCards() {
        const container = document.getElementById('personaCards');
        container.innerHTML = data.personas.map(p => `
          <article class="persona-card ${p.id}">
            <h3 class="card-name">${p.name}</h3>
            <p class="card-tagline">${p.tagline}</p>
            <p class="card-stats">${p.stats.join(' · ')}</p>
          </article>
        `).join('');
      }

      function renderPersonaTabs() {
        const container = document.getElementById('personaTabs');
        container.innerHTML = data.personas.map(p => `
          <button class="persona-tab ${p.id} ${p.id === currentPersonaId ? 'active' : ''}" data-id="${p.id}" type="button">${p.shortName}</button>
        `).join('');
        container.querySelectorAll('.persona-tab').forEach(btn => {
          btn.addEventListener('click', () => switchPersona(btn.dataset.id));
        });
      }

      function renderGraph() {
        const persona = data.personas.find(p => p.id === currentPersonaId);
        const scores = persona.stages.map(s => parseScore(s.score));
        const coords = getPlotCoords(scores);
        const baseY = PADDING.top + PLOT_HEIGHT;

        const linePath = buildSmoothPath(coords);
        const areaPath = buildSmoothPath(coords) + ` L ${coords[coords.length-1].x} ${baseY} L ${coords[0].x} ${baseY} Z`;

        const content = document.getElementById('graphContent');
        content.innerHTML = '';

        const gradStop0 = document.getElementById('gradStop0');
        const gradStop1 = document.getElementById('gradStop1');
        if (gradStop0) gradStop0.setAttribute('stop-color', persona.color);
        if (gradStop1) gradStop1.setAttribute('stop-color', persona.color);

        const area = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        area.setAttribute('d', areaPath);
        area.setAttribute('fill', 'url(#graphGradient)');
        area.setAttribute('class', 'graph-area');
        content.appendChild(area);

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line.setAttribute('d', linePath);
        line.setAttribute('stroke', persona.color);
        line.setAttribute('class', 'graph-line');
        content.appendChild(line);

        const pointsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        pointsGroup.setAttribute('class', 'points-group');

        coords.forEach((pt, i) => {
          const stage = persona.stages[i];
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.setAttribute('class', `graph-point ${i === activeStageIndex ? 'active' : ''} ${visitedStages.has(i) ? 'visited' : ''}`);
          g.style.setProperty('--point-fill', persona.color);
          g.style.color = persona.color;

          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', pt.x);
          circle.setAttribute('cy', pt.y);
          circle.setAttribute('r', i === activeStageIndex ? 8 : 6);
          circle.setAttribute('fill', visitedStages.has(i) ? persona.color : 'var(--bg)');
          circle.setAttribute('stroke', persona.color);
          circle.setAttribute('stroke-width', i === activeStageIndex ? 3 : 2);

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', pt.x);
          label.setAttribute('y', pt.y - 14);
          label.setAttribute('class', 'graph-emotion-label');
          label.textContent = stage.emotion;

          g.appendChild(circle);
          g.appendChild(label);
          g.addEventListener('click', () => selectStage(i));
          g.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectStage(i); } });
          g.setAttribute('tabindex', '0');
          g.setAttribute('role', 'button');
          g.setAttribute('aria-label', `${stage.name}: ${stage.emotion} ${stage.score}`);

          pointsGroup.appendChild(g);
        });
        content.appendChild(pointsGroup);

        stages.forEach((s, i) => {
          const x = PADDING.left + (i / 5) * PLOT_WIDTH;
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', x);
          label.setAttribute('y', VB_HEIGHT - 12);
          label.setAttribute('class', 'graph-label-x');
          label.textContent = s;
          content.appendChild(label);
        });

        for (let v = 1; v <= 5; v++) {
          const y = PADDING.top + (1 - (v - 1) / 4) * PLOT_HEIGHT;
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', PADDING.left - 8);
          label.setAttribute('y', y + 4);
          label.setAttribute('class', 'graph-label-y');
          label.textContent = v;
          content.appendChild(label);
        }
      }

      function selectStage(index) {
        activeStageIndex = index;
        visitedStages.add(index);
        renderPersonaTabs();
        renderGraph();
        updateContentPanel();
      }

      function updateContentPanel() {
        const panel = document.getElementById('contentPanel');
        if (activeStageIndex < 0) {
          panel.innerHTML = '<p class="empty-state">Click a point on the graph to explore each stage of the journey.</p>';
          return;
        }

        const persona = data.personas.find(p => p.id === currentPersonaId);
        const stage = persona.stages[activeStageIndex];

        panel.classList.add('fade-out');
        requestAnimationFrame(() => {
          panel.innerHTML = `
            <h3 class="stage-name">${stage.name}</h3>
            <span class="emotion-badge" style="background: ${persona.colorSoft}; color: ${persona.color}">${stage.emotion} ${stage.score}</span>
            <p class="context">${stage.context}</p>
            ${stage.quote ? `
              <div class="quote-block" style="border-left-color: ${persona.color}">
                <p class="quote">"${stage.quote.text}"</p>
                <span class="cite">— ${stage.quote.cite}</span>
              </div>
            ` : ''}
          `;
          panel.classList.remove('fade-out');
        });
      }

      function switchPersona(id) {
        if (id === currentPersonaId) return;
        const container = document.querySelector('.graph-container');
        if (container) container.classList.add('persona-switching');
        setTimeout(() => {
          currentPersonaId = id;
          activeStageIndex = -1;
          visitedStages = new Set();
          renderPersonaTabs();
          renderGraph();
          updateContentPanel();
          if (container) container.classList.remove('persona-switching');
        }, 400);
      }

      function renderComparison() {
        const comp = data.comparison || { heading: '', stage: '', cards: [] };
        document.getElementById('comparisonHeading').textContent = comp.heading;
        document.getElementById('comparisonStage').textContent = comp.stage;
        document.getElementById('comparisonCards').innerHTML = comp.cards.map(c => `
          <article class="comparison-card ${c.outlier ? 'outlier' : ''}" style="border-left-color: ${c.color}">
            <h3 class="card-persona">${c.persona}</h3>
            <p class="card-emotion">${c.emotion} · ${c.score}</p>
            <p class="quote">"${c.quote}"</p>
            <span class="card-cite">— ${c.cite}</span>
          </article>
        `).join('');
      }

      function renderClosing() {
        document.getElementById('closingHeading').textContent = data.closing.heading;
        document.getElementById('closingBody').textContent = data.closing.body;
      }

      renderPersonaCards();
      renderPersonaTabs();
      renderGraph();
      renderComparison();
      renderClosing();
    })();
  </script>
</body>
</html>
